<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Bastion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #application-canvas {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px 20px;
    }
    .hud-panel {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      min-width: 120px;
    }
    .hud-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .hud-value {
      font-size: 24px;
      font-weight: bold;
    }
    .hud-gold .hud-value {
      color: #ffd700;
    }
    .hud-hp .hud-value {
      color: #ff6b6b;
    }
    .hud-wave .hud-value {
      color: #4ecdc4;
    }
    .hud-timer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .hud-timer .hud-panel {
      background: rgba(78, 205, 196, 0.8);
    }
    .hud-timer .hud-value {
      font-size: 36px;
    }
    .hud-hidden {
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="application-canvas"></canvas>
  <div id="hud">
    <div class="hud-top">
      <div class="hud-panel hud-wave">
        <div class="hud-label">Wave</div>
        <div class="hud-value" id="hud-wave-value">1</div>
      </div>
      <div class="hud-panel hud-hp">
        <div class="hud-label">Base HP</div>
        <div class="hud-value" id="hud-hp-value">10/10</div>
      </div>
      <div class="hud-panel hud-gold">
        <div class="hud-label">Gold</div>
        <div class="hud-value" id="hud-gold-value">100</div>
      </div>
    </div>
    <div class="hud-timer hud-hidden" id="hud-timer">
      <div class="hud-panel">
        <div class="hud-label">Build Phase</div>
        <div class="hud-value" id="hud-timer-value">3.0</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
