<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Bastion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #application-canvas {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px 20px;
    }
    .hud-panel {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      min-width: 120px;
    }
    .hud-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .hud-value {
      font-size: 24px;
      font-weight: bold;
    }
    .hud-gold .hud-value {
      color: #ffd700;
    }
    .hud-hp .hud-value {
      color: #ff6b6b;
    }
    .hud-wave .hud-value {
      color: #4ecdc4;
    }
    .hud-highwave .hud-value {
      color: #9b59b6;
      font-size: 14px;
    }
    .hud-wave-panel {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hud-wave-panel .hud-sub {
      font-size: 12px;
      color: #888;
    }
    .hud-timer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .hud-timer .hud-panel {
      background: rgba(78, 205, 196, 0.8);
    }
    .hud-timer .hud-value {
      font-size: 36px;
    }
    .hud-hidden {
      display: none;
    }
    #defeat-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #defeat-screen.hidden {
      display: none;
    }
    .defeat-title {
      font-size: 48px;
      font-weight: bold;
      color: #ff6b6b;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .defeat-wave {
      font-size: 24px;
      color: #4ecdc4;
      margin-bottom: 8px;
    }
    .defeat-best {
      font-size: 18px;
      color: #9b59b6;
      margin-bottom: 32px;
    }
    .defeat-btn {
      padding: 16px 48px;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #4ecdc4, #2c8c85);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .defeat-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(78, 205, 196, 0.4);
    }
    .defeat-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .defeat-btn-secondary {
      background: linear-gradient(135deg, #666, #444);
    }
    .defeat-btn-secondary:hover {
      box-shadow: 0 4px 20px rgba(100, 100, 100, 0.4);
    }
    #main-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(20, 30, 40, 0.95), rgba(10, 20, 30, 0.98));
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    #main-menu.hidden {
      display: none;
    }
    .menu-title {
      font-size: 56px;
      font-weight: bold;
      color: #4ecdc4;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
    }
    .menu-subtitle {
      font-size: 16px;
      color: #888;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    .menu-best {
      font-size: 18px;
      color: #9b59b6;
      margin-bottom: 32px;
    }
    .menu-btn {
      padding: 20px 64px;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #4ecdc4, #2c8c85);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .menu-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 30px rgba(78, 205, 196, 0.5);
    }
  </style>
</head>
<body>
  <canvas id="application-canvas"></canvas>
  <div id="hud">
    <div class="hud-top">
      <div class="hud-panel hud-wave hud-wave-panel">
        <div>
          <div class="hud-label">Wave</div>
          <div class="hud-value" id="hud-wave-value">1</div>
        </div>
        <div class="hud-sub">Best: <span id="hud-highwave-value">0</span></div>
      </div>
      <div class="hud-panel hud-hp">
        <div class="hud-label">Base HP</div>
        <div class="hud-value" id="hud-hp-value">10/10</div>
      </div>
      <div class="hud-panel hud-gold">
        <div class="hud-label">Gold</div>
        <div class="hud-value" id="hud-gold-value">100</div>
      </div>
    </div>
    <div class="hud-timer hud-hidden" id="hud-timer">
      <div class="hud-panel">
        <div class="hud-label">Build Phase</div>
        <div class="hud-value" id="hud-timer-value">3.0</div>
      </div>
    </div>
  </div>
  <div id="defeat-screen" class="hidden">
    <div class="defeat-title">Defeat</div>
    <div class="defeat-wave">Wave: <span id="defeat-wave-value">1</span></div>
    <div class="defeat-best">Best: <span id="defeat-best-value">0</span></div>
    <div class="defeat-buttons">
      <button class="defeat-btn" id="defeat-continue-btn">Continue (Ad)</button>
      <button class="defeat-btn defeat-btn-secondary" id="defeat-restart-btn">Restart</button>
    </div>
  </div>
  <div id="main-menu">
    <div class="menu-title">Core Bastion</div>
    <div class="menu-subtitle">Tower Defense</div>
    <div class="menu-best">Best Wave: <span id="menu-best-value">0</span></div>
    <button class="menu-btn" id="menu-play-btn">Play</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
