<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Core Bastion</title>

  <!-- Yandex Games meta tags -->
  <meta name="yandex-games" content="enabled">

  <!-- Prevent scroll bounce on iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #application-canvas {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px 20px;
    }
    .hud-panel {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      min-width: 120px;
    }
    .hud-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .hud-value {
      font-size: 24px;
      font-weight: bold;
    }
    .hud-sub {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .hud-gold .hud-value {
      color: #ffd700;
    }
    .hud-hp .hud-value {
      color: #ff6b6b;
    }
    .hud-wave .hud-value {
      color: #4ecdc4;
    }
    .hud-highwave .hud-value {
      color: #9b59b6;
      font-size: 14px;
    }
    .hud-wave-panel {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hud-hidden {
      display: none;
    }
    .hud-timer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .hud-timer .hud-panel {
      background: rgba(78, 205, 196, 0.8);
    }
    .hud-timer .hud-value {
      font-size: 36px;
    }
    #defeat-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #defeat-screen.hidden {
      display: none;
    }
    .defeat-title {
      font-size: 48px;
      font-weight: bold;
      color: #ff6b6b;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .defeat-wave {
      font-size: 24px;
      color: #4ecdc4;
      margin-bottom: 8px;
    }
    .defeat-best {
      font-size: 18px;
      color: #9b59b6;
      margin-bottom: 32px;
    }
    .defeat-btn {
      padding: 16px 48px;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #4ecdc4, #2c8c85);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .defeat-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(78, 205, 196, 0.4);
    }
    .defeat-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .defeat-btn-secondary {
      background: linear-gradient(135deg, #666, #444);
    }
    .defeat-btn-secondary:hover {
      box-shadow: 0 4px 20px rgba(100, 100, 100, 0.4);
    }
    #main-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(20, 30, 40, 0.95), rgba(10, 20, 30, 0.98));
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    #main-menu.hidden {
      display: none;
    }
    .menu-title {
      font-size: 56px;
      font-weight: bold;
      color: #4ecdc4;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
    }
    .menu-subtitle {
      font-size: 16px;
      color: #888;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    .menu-best {
      font-size: 18px;
      color: #9b59b6;
      margin-bottom: 32px;
    }
    .menu-btn {
      padding: 20px 64px;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #4ecdc4, #2c8c85);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .menu-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 30px rgba(78, 205, 196, 0.5);
    }

    /* Tower Panel Styles */
    #tower-panel-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      pointer-events: auto;
      z-index: 20;
    }
    #tower-panel-container.hidden {
      display: none;
    }
    #tower-panel {
      background: rgba(0, 0, 0, 0.85);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .tower-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tower-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(78, 205, 196, 0.2), rgba(44, 140, 133, 0.2));
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      position: relative;
    }
    .tower-item:hover {
      transform: scale(1.02);
      box-shadow: 0 2px 12px rgba(78, 205, 196, 0.3);
      background: linear-gradient(135deg, rgba(78, 205, 196, 0.35), rgba(44, 140, 133, 0.35));
    }
    .tower-item.selected {
      border: 2px solid #4ecdc4;
      background: linear-gradient(135deg, rgba(78, 205, 196, 0.4), rgba(44, 140, 133, 0.4));
    }
    .tower-item.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .tower-item.disabled:hover {
      transform: none;
      box-shadow: none;
    }
    .tower-item-icon {
      font-size: 24px;
    }
    .tower-item-name {
      font-size: 13px;
      color: #fff;
      font-weight: 500;
      flex: 1;
    }
    .tower-item-cost {
      font-size: 13px;
      color: #ffd700;
      font-weight: bold;
    }
    .tower-hotkey {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.3);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .tower-info {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .tower-info-name {
      font-size: 14px;
      color: #4ecdc4;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .tower-info-stats {
      font-size: 11px;
      color: #aaa;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    .stat-label {
      color: #888;
    }
    .stat-value {
      color: #fff;
    }
    .tower-info-desc {
      font-size: 11px;
      color: #666;
      margin-top: 6px;
      font-style: italic;
    }

    /* Upgrade Menu Styles */
    #upgrade-menu {
      position: absolute;
      bottom: 100px;
      right: 20px;
      pointer-events: auto;
      z-index: 25;
      background: rgba(0, 0, 0, 0.9);
      border-radius: 12px;
      padding: 16px;
      min-width: 220px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    #upgrade-menu.hidden {
      display: none;
    }
    .upgrade-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .upgrade-tower-name {
      font-size: 16px;
      color: #4ecdc4;
      font-weight: bold;
    }
    .upgrade-close-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
    }
    .upgrade-close-btn:hover {
      color: #fff;
    }
    .upgrade-stats {
      margin-bottom: 12px;
    }
    .upgrade-current-stats {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .upgrade-next-stats {
      font-size: 12px;
      color: #4ecdc4;
    }
    .upgrade-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .upgrade-btn, .sell-btn {
      padding: 10px 16px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .upgrade-btn {
      background: linear-gradient(135deg, #4ecdc4, #2c8c85);
    }
    .upgrade-btn:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 2px 12px rgba(78, 205, 196, 0.4);
    }
    .upgrade-btn:disabled {
      background: #444;
      cursor: not-allowed;
    }
    .sell-btn {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
    }
    .sell-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 2px 12px rgba(231, 76, 60, 0.4);
    }

    /* Abilities Bar Styles */
    #abilities-bar-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      pointer-events: auto;
      z-index: 20;
    }
    #abilities-bar-container.hidden {
      display: none;
    }
    #abilities-bar {
      display: flex;
      gap: 10px;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .ability-slot {
      position: relative;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(155, 89, 182, 0.3), rgba(142, 68, 173, 0.3));
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .ability-slot:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 12px rgba(155, 89, 182, 0.4);
    }
    .ability-slot.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .ability-slot.disabled:hover {
      transform: none;
      box-shadow: none;
    }
    .ability-slot.on-cooldown {
      opacity: 0.6;
    }
    .ability-icon {
      font-size: 24px;
    }
    .ability-cost {
      font-size: 10px;
      color: #ffd700;
      font-weight: bold;
    }
    .ability-cooldown {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      border-radius: 8px;
    }
    .ability-cooldown.hidden {
      display: none;
    }
    .ability-hotkey {
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.3);
      padding: 1px 4px;
      border-radius: 3px;
    }
    .ability-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.95);
      border-radius: 8px;
      padding: 8px 12px;
      min-width: 150px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      margin-bottom: 8px;
      z-index: 30;
    }
    .ability-slot:hover .ability-tooltip {
      opacity: 1;
    }
    .tooltip-name {
      font-size: 12px;
      color: #9b59b6;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .tooltip-desc {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .tooltip-cooldown {
      font-size: 10px;
      color: #666;
    }

    /* Responsive */
    @media (max-width: 768px) {
      #tower-panel-container {
        left: 10px;
        bottom: 10px;
      }
      #abilities-bar-container {
        right: 10px;
        bottom: 10px;
      }
      .tower-item {
        padding: 8px 10px;
      }
      .tower-item-name {
        font-size: 11px;
      }
      .ability-slot {
        width: 50px;
        height: 50px;
      }
      .ability-icon {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <canvas id="application-canvas"></canvas>

  <!-- HUD Overlay -->
  <div id="hud">
    <div class="hud-top">
      <div class="hud-panel hud-wave hud-wave-panel">
        <div>
          <div class="hud-label" data-i18n="WAVE">Wave</div>
          <div class="hud-value" id="hud-wave-value">1</div>
        </div>
        <div class="hud-sub">Best: <span id="hud-highwave-value">0</span></div>
      </div>
      <div class="hud-panel hud-hp">
        <div class="hud-label" data-i18n="BASE_HP">Base HP</div>
        <div class="hud-value" id="hud-hp-value">10/10</div>
      </div>
      <div class="hud-panel hud-gold">
        <div class="hud-label" data-i18n="GOLD">Gold</div>
        <div class="hud-value" id="hud-gold-value">100</div>
      </div>
    </div>

    <!-- Build Phase Timer -->
    <div class="hud-timer hud-hidden" id="hud-timer">
      <div class="hud-panel">
        <div class="hud-label" data-i18n="BUILD_PHASE">Build Phase</div>
        <div class="hud-value" id="hud-timer-value">3.0</div>
      </div>
    </div>
  </div>

  <!-- Defeat Screen -->
  <div id="defeat-screen" class="hidden">
    <div class="defeat-title" data-i18n="DEFEAT">Defeat</div>
    <div class="defeat-wave">Wave: <span id="defeat-wave-value">1</span></div>
    <div class="defeat-best">Best: <span id="defeat-best-value">0</span></div>
    <div class="defeat-buttons">
      <button class="defeat-btn" id="defeat-continue-btn" data-i18n="CONTINUE_AD">Continue (Ad)</button>
      <button class="defeat-btn defeat-btn-secondary" id="defeat-restart-btn" data-i18n="RESTART">Restart</button>
    </div>
  </div>

  <!-- Main Menu -->
  <div id="main-menu">
    <div class="menu-title">Core Bastion</div>
    <div class="menu-subtitle" data-i18n="SUBTITLE">Tower Defense</div>
    <div class="menu-best">Best Wave: <span id="menu-best-value">0</span></div>
    <button class="menu-btn" id="menu-play-btn" data-i18n="PLAY">Play</button>
  </div>

  <!-- Tower Panel -->
  <div id="tower-panel-container" class="hidden">
    <div id="tower-panel">
      <div class="tower-list">
        <!-- Tower items will be rendered by TowerPanelController -->
      </div>
      <div class="tower-info">
        <!-- Tower info will be rendered by TowerPanelController -->
      </div>
    </div>
  </div>

  <!-- Upgrade Menu -->
  <div id="upgrade-menu" class="hidden">
    <div class="upgrade-header">
      <div class="upgrade-tower-name">Tower Name</div>
      <button class="upgrade-close-btn">&times;</button>
    </div>
    <div class="upgrade-stats">
      <div class="upgrade-current-stats">Lvl 1 | DMG: 15 | RNG: 6.0</div>
      <div class="upgrade-next-stats">Lvl 2 | DMG: 19 | RNG: 6.9</div>
    </div>
    <div class="upgrade-buttons">
      <button class="upgrade-btn">Upgrade (50g)</button>
      <button class="sell-btn">Sell (+50g)</button>
    </div>
  </div>

  <!-- Abilities Bar -->
  <div id="abilities-bar-container" class="hidden">
    <div id="abilities-bar">
      <!-- Ability slots will be rendered by AbilityBarController -->
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
